<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>Chat — SecureConnect-AI</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/discover"><span class="brand-dot" aria-hidden="true"></span><span>SecureConnect<span class="muted">·AI</span></span></a>
      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link" href="/discover">Discover</a>
        <a class="nav-link" href="/verify">Verify</a>
        <a class="nav-link" href="/profile">Profile</a>
        <button class="nav-link btn btn-ghost btn-sm" data-logout>Sign out</button>
      </nav>
    </div>
  </header>

  <main class="container chat-page">
    <div class="chat-head">
      <a class="nav-link" href="/discover">← Back</a>
      <h1 class="chat-title" id="chat-title">Group chat</h1>
      <span class="chat-presence" id="chat-presence">0 online</span>
    </div>

    <section class="chat-window" id="chat-window" aria-live="polite">
      <button class="chat-load-older" id="load-older" hidden>Load older messages</button>
      <ol class="chat-messages" id="chat-messages"></ol>
      <div class="chat-empty" id="chat-empty" hidden>
        <svg class="chat-empty-glyph" width="34" height="34" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.6-.8L3 21l1.8-5.9A8.5 8.5 0 1 1 21 11.5z" />
        </svg>
        <p class="chat-empty-title">No messages yet</p>
        <p class="chat-empty-sub">Be the first to post in this group.</p>
      </div>
      <div class="chat-typing" id="chat-typing" aria-live="polite"></div>
    </section>

    <form class="chat-composer" id="chat-composer">
      <div class="chat-field">
        <textarea id="chat-input" rows="1" maxlength="2000"
          placeholder="Message… (Enter to send, Shift+Enter for newline)"
          aria-label="Message"></textarea>
        <span class="chat-counter" id="chat-counter" hidden></span>
      </div>
      <button class="btn btn-primary chat-send" id="chat-send" type="submit" disabled>Send</button>
    </form>
  </main>

  <script type="module" src="/js/chat.js"></script>
</body>
</html>
