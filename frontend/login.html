<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>Sign in — SecureConnect-AI</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/"><span class="brand-dot" aria-hidden="true"></span><span>SecureConnect<span class="muted">·AI</span></span></a>
      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/register">Create account</a>
      </nav>
    </div>
  </header>

  <main class="auth-shell">
    <article class="card card-strong auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue to your hyperlocal network.</p>

      <form class="stack" data-form="login" novalidate>
        <div class="field">
          <label class="label" for="login-username">Username</label>
          <input class="input" id="login-username" name="username" autocomplete="username" required minlength="3" maxlength="32" />
        </div>
        <div class="field">
          <label class="label" for="login-password">Password</label>
          <input class="input" id="login-password" name="password" type="password" autocomplete="current-password" required minlength="1" />
        </div>
        <div class="help error hidden" data-error role="alert"></div>
        <button class="btn btn-primary btn-block" type="submit">Sign in</button>
      </form>

      <p class="auth-foot">New here? <a href="/register">Create an account</a></p>
      <p class="auth-foot mono dim" style="margin-top: var(--s-2); font-size:0.8rem;">
        demo: aryan_dev / DemoPass1234
      </p>
    </article>
  </main>

  <footer class="foot">
    <div class="container foot-inner">
      <span>© SecureConnect-AI — demo build</span>
      <span class="mono dim">Strict CSP · CSRF · Rate-limited</span>
    </div>
  </footer>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
